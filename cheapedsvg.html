<html>
<head>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #svg {
            position: absolute;
            inset: 0;
        }
    </style>


</head>
<body>
    <svg id="svg"></svg>
    <script type="module">
  import { RoadLoader } from "./js/roadio.js";
       let md = await RoadLoader.load("./mapdata/test3.json");

        
        const svg = document.querySelector("#svg");
        const main = create("g", { id: "main" });
let road =[];
	if (md.nodes.length>0) {
 road = md.nodes;

} else {

        road = [];
       }

const HIT_RADIUS = 24;

        const dragState = {
            active: false,
            moved: false,
            lastX: 0,
            lastY: 0,
            indices: [],
        };

        function create(tag, attrs) {
            const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
            for (const k in attrs) {
                el.setAttribute(k, attrs[k]);
            }
            return el;
        }

        function pointToWorld(ex, ey) {
            const w = document.body.clientWidth;
            const h = document.body.clientHeight;

            return {
                x: ex - Math.floor(w / 2),
                z: ey - Math.floor(h / 2),
            };
        }

        function setupSvg() {
            const w = document.body.clientWidth;
            const h = document.body.clientHeight;

            svg.setAttribute("width", String(w));
            svg.setAttribute("height", String(h));
            svg.setAttribute("viewBox", `0 0 ${w} ${h}`);

            svg.innerHTML = "";
            svg.appendChild(
                create("rect", {
                    x: 0,
                    y: 0,
                    width: w,
                    height: h,
                    stroke: "rgba(0,0,0,1)",
                    "stroke-width": 2,
                    "stroke-linecap": "round",
                    fill: "white",
                })
            );
            svg.appendChild(main);
            renderRoad();
        }

        function addRoadBit(ex, ey) {
            const world = pointToWorld(ex, ey);

            road.push({
                order: road.length,
                position: { x: world.x, y: 0, z: world.z },
                ex,
                ey,
                camber: 0,
                strips: [],
                width: 5,
            });
            navigator.clipboard.writeText(JSON.stringify(road, null, 2));
            renderRoad();
        }

        function renderRoad() {
            if (road===undefined) return;
            if (!road) return;
            if (road.length==0) return;
            main.innerHTML = "";

            for (let i = 1; i < road.length; i++) {
                main.appendChild(
                    create("path", {
                        d: `M ${road[i - 1].ex} ${road[i - 1].ey} L ${road[i].ex} ${road[i].ey}`,
                        stroke: "rgba(0,0,0,1)",
                        "stroke-width": 2,
                        "stroke-linecap": "round",
                        fill: "none",
                        id: `p${i - 1}-${i}`,
                    })
                );
            }

            for (let i = 0; i < road.length; i++) {
                let r = road[i];
                let rn = road[(i + 1) % (road.length)];

if (r !== rn) {
      r.diff = {
        x: rn.position.x - r.position.x,
        y: rn.position.y - r.position.y,
        z: rn.position.z - r.position.z,
      };
      r.mag = Math.sqrt(r.diff.x * r.diff.x + r.diff.y * r.diff.y + r.diff.z * r.diff.z);
      if (r.mag > 0)
        r.direction = { x: r.diff.x / r.mag, y: r.diff.y / r.mag, z: r.diff.z / r.mag };
      else r.direction = null;







                let t1 = { "x": r.position.x - r.direction.z * r.width / 2, "y": r.position.y, "z": r.position.z + r.direction.x * r.width / 2 };
                let t3 = { "x": r.position.x + r.direction.z * r.width / 2, "y": r.position.y, "z": r.position.z - r.direction.x * r.width / 2 };
}

                main.appendChild(
                    create("circle", {
                        cx: road[i].ex,
                        cy: road[i].ey,
                        r: 10,
                        fill: "none",
                        stroke: "black",
                        "stroke-width": "1",
                        id: `c${i}`,
                    })
                );
            }
        }

        function findCandidates(x, y) {
            const out = [];
            const r2 = HIT_RADIUS * HIT_RADIUS;

            for (let i = 0; i < road.length; i++) {
                const dx = x - road[i].ex;
                const dy = y - road[i].ey;

                if (dx * dx + dy * dy <= r2) {
                    out.push(i);
                }
            }

            return out;
        }

        document.body.onmousedown = function (e) {
            const x = e.clientX;
            const y = e.clientY;
            const indices = findCandidates(x, y);

            dragState.active = indices.length > 0;
            dragState.moved = false;
            dragState.indices = indices;
            dragState.lastX = x;
            dragState.lastY = y;
        };

        document.body.onmousemove = function (e) {
            if (!dragState.active || e.buttons === 0) {
                return;
            }

            const x = e.clientX;
            const y = e.clientY;
            const dx = x - dragState.lastX;
            const dy = y - dragState.lastY;

            if (dx !== 0 || dy !== 0) {
                dragState.moved = true;
            }

            for (const idx of dragState.indices) {
                road[idx].ex += dx;
                road[idx].ey += dy;

                const world = pointToWorld(road[idx].ex, road[idx].ey);
                road[idx].position.x = world.x;
                road[idx].position.z = world.z;
            }

            dragState.lastX = x;
            dragState.lastY = y;

            renderRoad();
        };

        document.body.onmouseup = function (e) {
            const x = e.clientX;
            const y = e.clientY;

            if (!dragState.active && findCandidates(x, y).length === 0) {
                addRoadBit(x, y);
            }

            dragState.active = false;
            dragState.indices = [];
            dragState.moved = false;
        };

        window.addEventListener("resize", setupSvg);

        setupSvg();
    </script>
</body>
</html>
